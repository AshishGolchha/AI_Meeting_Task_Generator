{% extends "base.html" %}
{% block title %}Join Organization{% endblock %}

{% block content %}

<div class="max-w-md mx-auto mt-16 clay-card p-10">

<h2 class="heading-font text-2xl font-extrabold mb-6">
Join Organization
</h2>

<p class="mb-6 text-sm text-gray-500">
Invited as: <b>{{ email }}</b>
</p>

<form method="POST" action="/register">

<input type="hidden" name="invite_code" value="{{ invite_code }}"/>

<input name="name" placeholder="Full Name" class="clay-inset w-full mb-4" required/>

<input name="email" value="{{ email }}" class="clay-inset w-full mb-4" readonly/>

<input type="password" name="password" placeholder="Password" class="clay-inset w-full mb-4" required/>

<button class="clay-button w-full bg-[var(--mint)] font-bold">
Join Organization
</button>

</form>

</div>

{% endblock %}
