{% extends "base.html" %}

{% block title %}Register • AI.MEET{% endblock %}

{% block content %}

<div class="max-w-md mx-auto mt-16 clay-card p-10">

  <h2 class="heading-font text-3xl font-extrabold mb-8 text-center">
    Register_
  </h2>

  <form method="POST" action="/register" class="space-y-6">

    <!-- Name -->
    <div>
      <label class="text-sm font-bold text-gray-600">
        Full Name
      </label>

      <input
        type="text"
        name="name"
        required
        class="clay-inset w-full mt-2"
        placeholder="Ashish Golchha"
      />
    </div>

    <!-- Email -->
    <div>
      <label class="text-sm font-bold text-gray-600">
        Work Email
      </label>

      <input
        type="email"
        name="email"
        required
        class="clay-inset w-full mt-2"
        placeholder="you@company.com"
      />
    </div>

    <!-- Password -->
    <div>
      <label class="text-sm font-bold text-gray-600">
        Password
      </label>

      <input
        type="password"
        name="password"
        required
        class="clay-inset w-full mt-2"
        placeholder="Create password"
      />
    </div>

    <!-- Organization -->
    <div>
      <label class="text-sm font-bold text-gray-600">
        Organization Name
      </label>

      <input
        type="text"
        name="org_name"
        required
        class="clay-inset w-full mt-2"
        placeholder="Tech Corp Pvt Ltd"
      />
    </div>

    <!-- Submit -->
    <button
      type="submit"
      class="clay-button w-full bg-[var(--mint)] font-bold"
    >
      Register & Create Org
    </button>

  </form>

  <!-- Login Redirect -->
  <p class="text-center text-sm text-gray-500 mt-6">

    Already registered?

    <a href="/login"
       class="font-bold text-blue-500">
       Login here
    </a>

  </p>

</div>

{% endblock %}
