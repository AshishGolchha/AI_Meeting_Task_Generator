{% extends "base.html" %}

{% block title %}Login • AI.MEET{% endblock %}

{% block content %}

<div class="max-w-md mx-auto mt-16 clay-card p-10">

  <h2 class="heading-font text-3xl font-extrabold mb-8 text-center">
    Login_
  </h2>

  {% if error %}

  <div class="mb-6 p-4 rounded-xl bg-red-100 text-red-600 text-sm font-bold">
  {{ error }}
  </div>

  {% endif %}

  <form method="POST" action="/login" class="space-y-6">

    <!-- Email -->
    <div>
      <label class="text-sm font-bold text-gray-600">
        Email
      </label>

      <input
        type="email"
        name="email"
        required
        class="clay-inset w-full mt-2"
        placeholder="you@company.com"
      />
    </div>

    <!-- Password -->
    <div>
      <label class="text-sm font-bold text-gray-600">
        Password
      </label>

      <input
        type="password"
        name="password"
        required
        class="clay-inset w-full mt-2"
        placeholder="••••••••"
      />
    </div>

    <!-- Submit -->
    <button
      type="submit"
      class="clay-button w-full bg-[var(--mint)] font-bold"
    >
      Login
    </button>

  </form>

  <!-- Register Redirect -->
  <p class="text-center text-sm text-gray-500 mt-6">

    New here?

    <a href="/register"
       class="font-bold text-blue-500">
       Create account
    </a>

  </p>

</div>

{% endblock %}
